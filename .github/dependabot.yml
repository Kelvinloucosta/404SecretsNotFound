version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    reviewers:
      - "Kelvinloucosta"       # your real GitHub username
    labels:
      - "security"
      - "dependencies"
